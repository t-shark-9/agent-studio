name: Build & Deploy to VPS

on:
  push:
    branches: [main, seo-pages]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy nginx config
        run: cp deploy/nginx-agent-studio.conf dist/

      - name: Deploy to VPS
        uses: easingthemes/ssh-deploy@v5
        with:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          REMOTE_HOST: 72.62.154.89
          REMOTE_USER: ${{ secrets.VPS_USER }}
          SOURCE: dist/
          TARGET: /var/www/agent-studio/
          ARGS: '-rlgoDzvc -i --delete'
          EXCLUDE: '*.map'

      - name: Configure Nginx on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 72.62.154.89
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Copy nginx config if not already set up
            sudo cp /var/www/agent-studio/nginx-agent-studio.conf /etc/nginx/sites-available/agent-studio.conf
            sudo ln -sf /etc/nginx/sites-available/agent-studio.conf /etc/nginx/sites-enabled/agent-studio.conf
            sudo nginx -t && sudo systemctl reload nginx
            echo "Deployed successfully!"
